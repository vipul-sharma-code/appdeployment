replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: alb
  host: api.example.com
  path: /

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70

externalSecret:
  enabled: true
  secretName: main-app-env
  awsSecretKey: dev/main-app
  refreshInterval: 1m

podDisruptionBudget:
  minAvailable: 1

serviceAccount:
  create: true
  name: "sa-mainapp"

env:
  NODE_ENV: production

