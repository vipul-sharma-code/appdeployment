apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "main-app.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ include "main-app.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "main-app.name" . }}
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default "default" }}
      containers:
        - name: main-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV }}
          #envFrom:
          #  - secretRef:
          #      name: {{ .Values.externalSecret.targetSecretName }}
          #resources:
          #  {{- toYaml .Values.resources | nindent 12 }}
          #livenessProbe:
          #  httpGet:
          #    path: /health
          #    port: 3000
          #  initialDelaySeconds: 20
          #  periodSeconds: 10
          #readinessProbe:
          #  httpGet:
          #    path: /health
          #    port: 3000
          #  initialDelaySeconds: 10
          #  periodSeconds: 5