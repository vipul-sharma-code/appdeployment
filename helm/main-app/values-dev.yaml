replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  host: a1fc1134bcb3a4c94ba6de2582003fd7-1881243468.us-west-2.elb.amazonaws.com
  path: /

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70

externalSecret:
  enabled: false
  name: aws-secrets-manager
  refreshInterval: 1m
  secretStoreName: aws-secrets-manager
  targetSecretName: dev-main-app-env

podDisruptionBudget:
  minAvailable: 1

serviceAccount:
  create: true
  name: "sa-mainapp"

env:
  MICROSERVICE_URL: http://microservice.dev.svc.cluster.local:3001

#externalSecret:
#  secretName: microservice-env
#  awsSecretKey: dev/microservice