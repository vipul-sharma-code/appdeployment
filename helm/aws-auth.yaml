    - rolearn: arn:aws:iam::071564830585:role/GITHUB_ROLE
      username: github-actions
      groups:
        - system:masters
        - system:bootstrappers
        - system:nodes

    - rolearn: arn:aws:iam::071564830585:role/eks-access-developer-role
      username: dev-users
      groups:
        - developers
