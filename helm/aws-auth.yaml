apiVersion: v1
data:
  mapRoles: |
    - rolearn: arn:aws:iam::071564830585:role/eks-cluster-v2-main-eks-node-group-20260228212140983900000003
      username: system:node:{{EC2PrivateDNSName}}
      groups:
